name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-engine:
    name: Test Python Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install ruff mypy
          pip install fastapi uvicorn pydantic pyyaml soundfile numpy httpx
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy --ignore-missing-imports --explicit-package-bases .
      - name: Run tests
        run: python tests/run_all.py

  build-desktop:
    name: Build Desktop (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Vite build
        run: npx vite build

  analyze-mobile:
    name: Analyze Mobile (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24"
      - run: flutter pub get
      - run: flutter analyze || true